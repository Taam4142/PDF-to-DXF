name: Windows Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v. Must match APP_VERSION."
        required: true
        type: string
      draft:
        description: "Create the release as a draft."
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

jobs:
  release-native-windows-app:
    name: Release native Windows app
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]" pyinstaller

      - name: Resolve release version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $requestedVersion = "${{ inputs.version }}"
            python scripts\validate_release_version.py --version $requestedVersion
          } else {
            $tagName = "${{ github.ref_name }}"
            python scripts\validate_release_version.py --tag $tagName
          }
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $appVersion = (python -c "from pdf_to_dxf.app_info import APP_VERSION; print(APP_VERSION)").Trim()
          $releaseTag = "v$appVersion"
          "APP_VERSION=$appVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build native desktop executable
        run: |
          pyinstaller windows_native_app.spec --noconfirm --clean --distpath dist/windows-native-app --workpath build/pyinstaller-native

      - name: Smoke test packaged executable
        run: |
          python scripts/smoke_native_app.py --exe dist/windows-native-app/PDF-to-DXF-Desktop.exe --work-dir out/native-smoke

      - name: Validate signing configuration
        shell: pwsh
        env:
          WINDOWS_SIGNING_MODE: ${{ vars.WINDOWS_SIGNING_MODE }}
          WINDOWS_SIGNING_CERT_SHA1: ${{ secrets.WINDOWS_SIGNING_CERT_SHA1 }}
          WINDOWS_SIGNING_PFX_B64: ${{ secrets.WINDOWS_SIGNING_PFX_B64 }}
          WINDOWS_SIGNING_PFX_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
          AZURE_ARTIFACT_SIGNING_ENDPOINT: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          AZURE_ARTIFACT_SIGNING_ACCOUNT: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          AZURE_ARTIFACT_SIGNING_CERT_PROFILE: ${{ vars.AZURE_ARTIFACT_SIGNING_CERT_PROFILE }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          New-Item -ItemType Directory -Force dist\release
          python scripts\validate_signing_config.py --allow-signed-modes --output dist\release\signing-status.json
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $signingStatus = Get-Content -Raw -LiteralPath "dist\release\signing-status.json" | ConvertFrom-Json
          if ($signingStatus.mode -notin @("unsigned", "azure-artifact-signing")) {
            throw "Signing mode '$($signingStatus.mode)' is not implemented by the Windows Release workflow."
          }
          if ($signingStatus.mode -ne "unsigned" -and -not $signingStatus.ready_to_sign) {
            throw "Signing mode '$($signingStatus.mode)' is selected but configuration is incomplete: $($signingStatus.missing -join ', ')."
          }

          "SIGNING_MODE=$($signingStatus.mode)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SIGNING_READY_TO_SIGN=$($signingStatus.ready_to_sign.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Authenticate to Azure for Artifact Signing
        if: env.SIGNING_MODE == 'azure-artifact-signing' && env.SIGNING_READY_TO_SIGN == 'true'
        uses: azure/login@v3
        env:
          AZURE_CORE_OUTPUT: none
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign portable executable with Artifact Signing
        if: env.SIGNING_MODE == 'azure-artifact-signing' && env.SIGNING_READY_TO_SIGN == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}\dist\windows-native-app
          files-folder-filter: PDF-to-DXF-Desktop.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: PDF to DXF portable Windows app
          description-url: https://github.com/${{ github.repository }}

      - name: Verify signed portable executable
        if: env.SIGNING_MODE == 'azure-artifact-signing' && env.SIGNING_READY_TO_SIGN == 'true'
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\verify_authenticode_signatures.ps1 `
            -Path dist\windows-native-app\PDF-to-DXF-Desktop.exe `
            -Output dist\release\portable-authenticode-verification.json

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build_windows_installer.ps1 -Python python

      - name: Sign installer with Artifact Signing
        if: env.SIGNING_MODE == 'azure-artifact-signing' && env.SIGNING_READY_TO_SIGN == 'true'
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ vars.AZURE_ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_ARTIFACT_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_ARTIFACT_SIGNING_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}\dist\installer
          files-folder-filter: PDF-to-DXF-Desktop-Setup-${{ env.APP_VERSION }}.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: PDF to DXF Windows installer
          description-url: https://github.com/${{ github.repository }}

      - name: Verify signed installer
        if: env.SIGNING_MODE == 'azure-artifact-signing' && env.SIGNING_READY_TO_SIGN == 'true'
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\verify_authenticode_signatures.ps1 `
            -Path dist\installer\PDF-to-DXF-Desktop-Setup-$env:APP_VERSION.exe `
            -Output dist\release\installer-authenticode-verification.json

      - name: Prepare release assets
        shell: pwsh
        run: |
          $releaseDir = "dist\release"
          New-Item -ItemType Directory -Force $releaseDir
          $signingStatus = Get-Content -Raw -LiteralPath "$releaseDir\signing-status.json" | ConvertFrom-Json
          $signingSummary = $signingStatus.summary
          if ($signingStatus.mode -eq "azure-artifact-signing") {
            $portableVerification = Get-Content -Raw -LiteralPath "$releaseDir\portable-authenticode-verification.json" | ConvertFrom-Json
            $installerVerification = Get-Content -Raw -LiteralPath "$releaseDir\installer-authenticode-verification.json" | ConvertFrom-Json
            if (-not $portableVerification.ok -or -not $installerVerification.ok) {
              throw "Authenticode verification did not report success."
            }
            $signingSummary = "Signed with Microsoft Artifact Signing; Authenticode verification passed for both release artifacts."
          }

          $portableExe = "dist\windows-native-app\PDF-to-DXF-Desktop.exe"
          $portableReleaseExe = "$releaseDir\PDF-to-DXF-Desktop-$env:APP_VERSION.exe"
          Copy-Item -LiteralPath $portableExe -Destination $portableReleaseExe

          $installer = "dist\installer\PDF-to-DXF-Desktop-Setup-$env:APP_VERSION.exe"
          $installerReleaseExe = "$releaseDir\PDF-to-DXF-Desktop-Setup-$env:APP_VERSION.exe"
          Copy-Item -LiteralPath $installer -Destination $installerReleaseExe

          @"
          PDF to DXF $env:APP_VERSION

          Assets:
          - PDF-to-DXF-Desktop-$env:APP_VERSION.exe: portable native Windows app
          - PDF-to-DXF-Desktop-Setup-$env:APP_VERSION.exe: Windows installer

          Notes:
          - This is a vector-first PDF to DXF converter.
          - Scanned or image-only PDFs are reported but not traced into editable CAD geometry.
          - Signing status: $signingSummary
          "@ | Set-Content -LiteralPath "$releaseDir\release-notes.md" -Encoding utf8

      - name: Upload release build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PDF-to-DXF-Desktop-release-windows
          path: dist/release/*
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $draftArgs = @()
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.draft }}" -eq "true") {
            $draftArgs += "--draft"
          }

          $verifyTagArgs = @()
          if ("${{ github.event_name }}" -ne "workflow_dispatch") {
            $verifyTagArgs += "--verify-tag"
          }

          gh release create $env:RELEASE_TAG `
            "dist\release\PDF-to-DXF-Desktop-$env:APP_VERSION.exe" `
            "dist\release\PDF-to-DXF-Desktop-Setup-$env:APP_VERSION.exe" `
            --repo "${{ github.repository }}" `
            --target "${{ github.sha }}" `
            --title "PDF to DXF $env:APP_VERSION" `
            --notes-file "dist\release\release-notes.md" `
            @draftArgs `
            @verifyTagArgs
