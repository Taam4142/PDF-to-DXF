name: Windows Desktop Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-native-windows-app:
    name: Build native Windows app
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]" pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build native desktop executable
        run: |
          pyinstaller windows_native_app.spec --noconfirm --clean --distpath dist/windows-native-app --workpath build/pyinstaller-native

      - name: Smoke test packaged executable
        run: |
          python scripts/smoke_native_app.py --exe dist/windows-native-app/PDF-to-DXF-Desktop.exe --work-dir out/native-smoke

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-to-DXF-Desktop-windows
          path: dist/windows-native-app/PDF-to-DXF-Desktop.exe
          if-no-files-found: error
          retention-days: 14
